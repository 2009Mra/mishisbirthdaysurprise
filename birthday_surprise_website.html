<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">

<style>
*{font-family:'Baloo 2',cursive}
body{background:white;overflow-x:hidden}
.floaty{animation:floaty 3s ease-in-out infinite}
.fade{animation:fade .5s ease}
@keyframes floaty{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_9464983d46.mp3?filename=romantic-background-112763.mp3" type="audio/mpeg">
</audio>

<div class="w-full max-w-3xl bg-[#fffafa] border border-pink-100 rounded-[40px] shadow-2xl p-8 relative z-10">

<div class="flex items-center justify-between mb-8">
<div class="flex gap-2">
<div class="w-4 h-4 bg-red-300 rounded-full"></div>
<div class="w-4 h-4 bg-yellow-300 rounded-full"></div>
<div class="w-4 h-4 bg-green-300 rounded-full"></div>
</div>

<div class="bg-pink-100 text-pink-500 px-4 py-2 rounded-full text-sm font-bold">
Made for you by Raf :).exe
</div>
</div>

<div class="text-center mb-8">
<p id="typed" class="text-pink-500 text-2xl font-extrabold lowercase"></p>
</div>

<div id="screen1" class="text-center fade">
<img src="https://media.tenor.com/W3t9j6lBKOEAAAAi/snoopy-flowers.gif" class="mx-auto w-40 floaty">

<h1 class="text-5xl font-black text-pink-500 mt-4">
Choose the correct heart 💖
</h1>

<div class="grid grid-cols-3 gap-4 mt-10 max-w-sm mx-auto">
<button onclick="showScreen(2)" class="bg-pink-100 rounded-2xl p-5 hover:scale-110 transition">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
<button class="bg-pink-100 rounded-2xl p-5">💖</button>
</div>
</div>

<div id="screen2" class="hidden text-center fade">
<img src="https://tenor.com/view/hug-gif-11471218339258774461" class="mx-auto w-52 floaty">

<h1 class="text-5xl font-black text-pink-500 mt-4">
HAPPIEST BIRTHDAY TO YOU MISHHH🎂
</h1>

<p class="mt-6 text-lg text-gray-500">
You deserve the best memories ever ✨
</p>

<button onclick="showScreen(3)" class="mt-10 bg-pink-400 text-white px-8 py-4 rounded-full font-bold">
Next →
</button>
</div>

<div id="screen3" class="hidden text-center fade">
<h1 class="text-5xl font-black text-pink-500 mb-10">
Main character energy 📸
</h1>

<div class="bg-pink-50 p-5 rounded-[30px] max-w-md mx-auto shadow-xl">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
class="rounded-3xl w-full h-80 object-cover">
</div>

<button onclick="showScreen(4)" class="mt-10 bg-pink-400 text-white px-8 py-4 rounded-full font-bold">
Next →
</button>
</div>

<div id="screen4" class="hidden text-center fade">
<h1 class="text-5xl font-black text-pink-500">
Choose your surprise:) 🎁
</h1>

<div class="grid md:grid-cols-3 gap-6 mt-12">
<button onclick="gift('camera')" class="bg-pink-50 rounded-3xl p-8 shadow-lg">📷</button>
<button onclick="gift('letter')" class="bg-pink-50 rounded-3xl p-8 shadow-lg">💌</button>
<button onclick="gift('star')" class="bg-pink-50 rounded-3xl p-8 shadow-lg">✨</button>
</div>

<div id="giftbox"></div>
</div>

</div>

<script>
const message="happy birthday to the prettiest soul ever 💝";
const typed=document.getElementById("typed");

let i=0;
function type(){
if(i<=message.length){
typed.innerHTML=message.slice(0,i)+"|";
i++;
setTimeout(type,70);
}
}
type();

function showScreen(n){
for(let i=1;i<=4;i++){
document.getElementById("screen"+i).classList.add("hidden");
}
document.getElementById("screen"+n).classList.remove("hidden");
}

function gift(type){
const box=document.getElementById("giftbox");

if(type==="camera"){
box.innerHTML='<div class="mt-10 bg-pink-50 rounded-3xl p-8 shadow-xl">Every memory with you becomes my favorite memory 💖</div>';
}

if(type==="letter"){
box.innerHTML='<div class="mt-10 bg-pink-50 rounded-3xl p-8 shadow-xl">Its been a good 4 years with you, May allah bring you all the happiness and kindness that you deserve, and enjoy this day with all of your heart 🎂✨</div>';
}

if(type==="star"){
box.innerHTML='<div class="mt-10 bg-pink-50 rounded-3xl p-8 shadow-xl">You are the real gift to me 🎁✨</div>';
}
}
</script>

</body>
</html>
